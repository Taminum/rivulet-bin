<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} | {{ site_name }}</title>
    <meta name="description" content="{{ tagline }}">
    <script>
        (function () {
            const stored = localStorage.getItem("colorTheme") || "dark";
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const resolved = stored === "auto" ? (prefersDark ? "dark" : "light") : stored;
            document.documentElement.dataset.theme = resolved;
            document.documentElement.dataset.themePreference = stored;
        })();
    </script>
    <link rel="stylesheet" href="{{ request.url_for('static', path='/vendor/codemirror/codemirror.min.css') }}?v={{ asset_version }}">
    <link rel="stylesheet" href="{{ request.url_for('static', path='/vendor/codemirror/addon/fold/foldgutter.min.css') }}?v={{ asset_version }}">
    <link rel="stylesheet" href="{{ request.url_for('static', path='/styles.css') }}?v={{ asset_version }}">
</head>
<body class="app-body {% block body_class %}{% endblock %}">
    <header class="site-header">
        <div class="shell topbar">
            <div class="topbar-left">
                <a class="brand" href="/">
                    <span class="brand-mark" aria-hidden="true">
                        <span class="brand-mark-dot"></span>
                    </span>
                    <span class="brand-copy">
                        <strong>{{ site_name }}</strong>
                    </span>
                </a>
            </div>

            {% block topbar_editor %}{% endblock %}

            <div class="topbar-right">
                {% block topbar_actions %}
                <a href="/about">About</a>
                {% endblock %}
                {% if current_user %}
                <a class="topbar-account-link" href="/account">@{{ current_user.username }}</a>
                <a href="/logout">Log out</a>
                {% else %}
                <a href="/login">Login</a>
                <a href="/register">Register</a>
                {% endif %}
                <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle theme">Auto</button>
            </div>
        </div>
    </header>
    <main class="shell page-shell {% block page_shell_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/codemirror.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/addon/edit/matchbrackets.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/addon/mode/overlay.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/addon/selection/active-line.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/addon/fold/foldcode.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/addon/fold/foldgutter.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/addon/fold/brace-fold.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/addon/fold/indent-fold.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/mode/javascript/javascript.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/mode/yaml/yaml.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/mode/python/python.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/mode/sql/sql.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/mode/xml/xml.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/mode/css/css.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/vendor/codemirror/mode/shell/shell.min.js') }}?v={{ asset_version }}" defer></script>
    <script src="{{ request.url_for('static', path='/app.js') }}?v={{ asset_version }}" defer></script>
</body>
</html>
