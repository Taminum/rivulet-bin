services:
  app:
    image: ghcr.io/taminum/rivulet-bin:latest
    container_name: rivulet-app
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "15212"
      - --proxy-headers
      - --forwarded-allow-ips=*
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/rivulet
      SITE_NAME: Rivulet Bin
      SITE_TAGLINE: Create pastes, publish notes, and shorten links.
      SECRET_SALT: change-me-before-production
      MAX_CONTENT_SIZE: 200000
    ports:
      - "15212:15212"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: rivulet-db
    environment:
      POSTGRES_DB: rivulet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rivulet"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
